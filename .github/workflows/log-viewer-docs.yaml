name: "docs"

on:
  pull_request:
    paths: &monitored_paths
      - "docs/**"
      - ".github/workflows/log-viewer-docs.yaml"
      - ".gitmodules"
      - "taskfile.yaml"
      - "tools/scripts/**"
      - "tools/yscope-dev-utils"
  push:
    paths: *monitored_paths
  schedule:
    # Run daily at 00:15 UTC (the 15 is to avoid periods of high load)
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: "${{github.workflow}}-${{github.ref}}"

  # Cancel in-progress jobs for efficiency
  cancel-in-progress: true

jobs:
  build:
    name: "build"
    strategy:
      matrix:
        os: ["macos-latest", "ubuntu-latest"]
    runs-on: "${{matrix.os}}"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          lfs: "true"
          submodules: "recursive"

      - uses: "./tools/yscope-dev-utils/exports/github/actions/install-python"
        with:
          version: "3.10"

      - uses: "./tools/yscope-dev-utils/exports/github/actions/install-go-task"

      - name: "Build docs"
        shell: "bash"
        run: "task docs:site"

      # Upload the built docs site if we need to debug any issues
      - if: >-
          contains(fromJSON('["push", "workflow_dispatch"]'), github.event_name)
          && ('refs/heads/main' == github.ref || startsWith(github.ref, 'refs/tags/v'))
          && 'ubuntu-latest' == matrix.os
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02"
        with:
          name: "docs-html"
          path: "build/docs/html"
          if-no-files-found: "error"

          # Retain the artifact for a week
          retention-days: 7
